services:
  postgres:
    image: postgres:16-alpine
    container_name: vinhlong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vinhlong
      POSTGRES_PASSWORD: vinhlong123
      POSTGRES_DB: vinhlong
    ports:
      - "5434:5432"
    volumes:
      - vinhlong_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinhlong -d vinhlong"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vinhlong-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - vinhlong_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vinhlong_postgres_data:
  vinhlong_redis_data:
